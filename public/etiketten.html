<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Etikettenaufträge – Vertrieb</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .etikett-item {
      display: flex; align-items: flex-start; gap: .75rem;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: .9rem 1rem;
      margin-bottom: .6rem; transition: opacity .3s;
    }
    .etikett-item.erledigt { opacity: .55; }
    .etikett-body { flex: 1; min-width: 0; }
    .etikett-name { font-size: 1.05rem; font-weight: 700; color: var(--text); word-break: break-word; }
    .etikett-menge {
      display: inline-block; margin-top: .3rem;
      background: #eff6ff; border: 1px solid #bfdbfe;
      color: #1d4ed8; font-size: .95rem; font-weight: 700;
      border-radius: 6px; padding: .15rem .55rem;
    }
    .etikett-meta { display: flex; flex-wrap: wrap; gap: .4rem .8rem; margin-top: .45rem; }
    .etikett-meta span { display: flex; align-items: center; gap: .3rem; font-size: .8rem; color: var(--text2); }
    .etikett-meta svg { width: 13px; height: 13px; flex-shrink: 0; }
    .erledigt-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .78rem; color: var(--green); font-weight: 600;
      margin-top: .35rem;
    }
    .erledigt-badge svg { width: 13px; height: 13px; }
    .check-btn-et {
      width: 38px; height: 38px; flex-shrink: 0; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; color: var(--text3);
    }
    .check-btn-et:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .check-btn-et.checked { border-color: var(--green); background: var(--green); color: #fff; }
    .check-btn-et svg { width: 16px; height: 16px; }
    .name-bar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .5rem 1rem; display: flex; align-items: center; gap: .5rem;
      font-size: .85rem; color: var(--text2);
    }
    .name-bar strong { color: var(--text); }
    .name-bar button { margin-left: auto; font-size: .78rem; background: none; border: none; color: var(--accent); cursor: pointer; text-decoration: underline; }
    .name-modal-simple { display: flex; flex-direction: column; gap: .75rem; }
  </style>
</head>
<body>

  <!-- Name-Modal (kein Passwort, nur Name) -->
  <div id="name-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <img src="/logo.png" alt="PITUPITA" class="modal-logo" />
      <div class="modal-app-title">Etikettenaufträge</div>
      <h2>Wer bist du?</h2>
      <p>Dein Name wird bei Erledigungen gespeichert.</p>
      <input type="text" id="name-input" placeholder="Dein Name..." maxlength="40" autocomplete="off" />
      <button id="name-btn" onclick="setName()">Weiter</button>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="/logo.png" alt="PITUPITA" class="header-logo" />
      </div>
      <div class="header-right">
        <div class="connection-status" id="conn-status">
          <span class="dot"></span>
          <span class="conn-label">Verbinde...</span>
        </div>
      </div>
    </div>
  </header>

  <div id="name-bar" class="name-bar hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Angemeldet als <strong id="name-display"></strong>
    <button onclick="changeName()">Ändern</button>
  </div>

  <div class="page-title">Etikettenaufträge</div>

  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-num" id="stat-offen">0</span>
      <span class="stat-label">Offen</span>
    </div>
    <div class="stat-card">
      <span class="stat-num green" id="stat-erledigt">0</span>
      <span class="stat-label">Erledigt</span>
    </div>
  </div>

  <main>
    <section class="card list-card">
      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <h2>Aufträge</h2>
        <div class="filter-tabs">
          <button class="tab active" onclick="setFilter('offen', this)">Offen</button>
          <button class="tab" onclick="setFilter('erledigt', this)">Erledigt</button>
          <button class="tab" onclick="setFilter('alle', this)">Alle</button>
        </div>
      </div>
      <div id="etikett-liste">
        <div class="loading"><div class="spinner"></div><span>Lade...</span></div>
      </div>
    </section>
  </main>

  <div id="toast-container"></div>

  <script src="/socket.io.min.js"></script>
  <script src="etiketten.js"></script>
</body>
</html>
