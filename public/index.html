<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ware fehlt - Lagerverwaltung</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Name-Modal beim Start -->
  <div id="name-modal" class="modal-overlay">
    <div class="modal-box">
      <img src="/logo.png" alt="PITUPITA" class="modal-logo" />
      <div class="modal-app-title">Ware fehlt</div>
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h2>Willkommen</h2>
      <p>Gib deinen Namen ein, damit andere wissen, wer Eintraege meldet oder erledigt.</p>
      <input type="text" id="user-name-input" placeholder="Dein Name..." maxlength="40" />
      <button id="user-name-btn" onclick="setUserName()">Weiter</button>
    </div>
  </div>

  <!-- Erledigt-Modal -->
  <div id="erledigt-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Ware aufgefuellt?</h2>
      <p>Wer hat diesen Artikel aufgefuellt?</p>
      <input type="text" id="erledigt-name-input" placeholder="Dein Name..." maxlength="40" />
      <button onclick="bestaetigeErledigt()">Bestaetigen</button>
      <button class="btn-secondary" onclick="closeErledigtModal()">Abbrechen</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="/logo.png" alt="PITUPITA" class="header-logo" />
      </div>
      <div class="header-right">
        <div class="connection-status" id="conn-status">
          <span class="dot"></span>
          <span class="conn-label">Verbinde...</span>
        </div>
        <div class="current-user" id="current-user-display" onclick="changeUser()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="current-user-name">-</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Seitenüberschrift -->
  <div class="page-title">Fehlende Artikel</div>

  <!-- Statistik-Banner -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-num" id="stat-offen">0</span>
      <span class="stat-label">Offen</span>
    </div>
    <div class="stat-card">
      <span class="stat-num green" id="stat-erledigt">0</span>
      <span class="stat-label">Erledigt</span>
    </div>
    <div class="stat-card">
      <span class="stat-num blue" id="stat-lagerorte">0</span>
      <span class="stat-label">Lagerorte</span>
    </div>
    <div class="stat-card">
      <span class="stat-num gray" id="stat-gesamt">0</span>
      <span class="stat-label">Gesamt</span>
    </div>
  </div>

  <main>
    <!-- Neuer Eintrag -->
    <section class="card form-card">
      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <h2>Fehlende Ware melden</h2>
        <button class="toggle-form-btn" id="toggle-form-btn" onclick="toggleForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>
      <div id="form-body">
        <div class="form-grid">
          <div class="form-group required">
            <label>Artikelname</label>
            <div class="input-wrap">
              <input type="text" id="f-name" placeholder="z.B. Rinderlefzen" maxlength="100" autocomplete="off" />
              <button type="button" id="f-name-clear" class="input-clear hidden" tabindex="-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group required">
            <label>Artikelnummer</label>
            <input type="text" id="f-nummer" placeholder="z.B. 21-4270-002" maxlength="50" />
          </div>
          <div class="form-group required">
            <label>Lagerort</label>
            <input type="text" id="f-lagerort" placeholder="z.B. F04-02-02" maxlength="80" list="lagerorte-list" />
            <datalist id="lagerorte-list"></datalist>
          </div>
          <div class="form-group">
            <label>Einheit</label>
            <select id="f-einheit">
              <option>AUFFÜLLEN</option>
              <option>RESERVE AUFFÜLLEN</option>
              <option>BEKLEBEN</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>Notiz (optional)</label>
            <input type="text" id="f-notiz" placeholder="z.B. DRINGEND" maxlength="200" />
          </div>
        </div>
        <button class="btn-submit" onclick="submitArtikel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="12 5 12 19"/><polyline points="5 12 12 5 19 12"/></svg>
          Melden
        </button>
      </div>
    </section>

    <!-- Filter & Liste -->
    <section class="card list-card">
      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <h2>Fehlende Waren</h2>
        <div class="filter-tabs">
          <button class="tab active" data-filter="offen" onclick="setFilter('offen', this)">Offen</button>
          <button class="tab" data-filter="erledigt" onclick="setFilter('erledigt', this)">Erledigt</button>
          <button class="tab" data-filter="alle" onclick="setFilter('alle', this)">Alle</button>
        </div>
      </div>

      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Suchen nach Artikel, Lagerort..." oninput="renderListe()" />
      </div>

      <div id="artikel-liste">
        <div class="loading">
          <div class="spinner"></div>
          <span>Lade Daten...</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast-Bereich -->
  <div id="toast-container"></div>

  <script src="/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
