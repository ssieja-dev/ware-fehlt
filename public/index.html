<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ware fehlt - Lagerverwaltung</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Login-Modal beim Start -->
  <div id="name-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <img src="/logo.png" alt="PITUPITA" class="modal-logo" />
      <div class="modal-app-title">Ware fehlt</div>
      <div class="modal-dog">
        <img src="/dackel.png" alt="Dackel" />
      </div>
      <h2>Willkommen</h2>
      <p>Gib deinen Namen und das Passwort ein.</p>
      <input type="text" id="user-name-input" placeholder="Dein Name..." maxlength="40" autocomplete="off" />
      <input type="password" id="user-passwort-input" placeholder="Passwort..." maxlength="80" autocomplete="off" />
      <button id="user-name-btn" onclick="setUserName()">Weiter</button>
    </div>
  </div>

  <!-- Erledigt-Modal -->
  <div id="erledigt-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 id="erledigt-frage">Ware aufgefuellt?</h2>
      <button onclick="bestaetigeErledigt()">Ja, bestaetigen</button>
      <button class="btn-secondary" onclick="closeErledigtModal()">Abbrechen</button>
    </div>
  </div>

  <!-- Löschen-Modal -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon" style="background:#fef2f2;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <h2>Artikel löschen?</h2>
      <p id="delete-modal-text" style="font-weight:600;color:#374151;"></p>
      <button class="btn-danger" onclick="bestaetigeLoeschen()">Ja, löschen</button>
      <button class="btn-secondary" onclick="closeDeleteModal()">Abbrechen</button>
    </div>
  </div>

  <!-- Etiketten-Modal -->
  <div id="etiketten-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon" style="background:#eff6ff;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </div>
      <h2>Etiketten bestellen</h2>
      <p id="etiketten-artikel-info" style="font-weight:600;color:#374151;margin-bottom:1rem;"></p>
      <div class="mengen-stepper">
        <button class="stepper-btn"
          onmousedown="stepperStart(-1)" onmouseup="stepperStop()" onmouseleave="stepperStop()"
          ontouchstart="stepperStart(-1)" ontouchend="stepperStop()">−</button>
        <span class="stepper-wert" id="etiketten-menge-display">1</span>
        <button class="stepper-btn"
          onmousedown="stepperStart(1)" onmouseup="stepperStop()" onmouseleave="stepperStop()"
          ontouchstart="stepperStart(1)" ontouchend="stepperStop()">+</button>
        <button class="stepper-confirm" onclick="bestaetigeEtiketten()" title="Bestellen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>

      <div class="et-toggle">
        <button class="et-toggle-btn active" id="toggle-lieferung" onclick="setEtikettenTyp('lieferung')">Lieferung</button>
        <button class="et-toggle-btn" id="toggle-mhd" onclick="setEtikettenTyp('mhd')">MHD am Artikel</button>
      </div>
      <div id="et-feld-lieferung" class="et-feld">
        <div class="lieferung-panel">
          <div class="lieferung-datum-row">
            <input type="date" id="et-lieferung-datum" oninput="updateEtLieferungPreview()" />
            <span class="kw-badge" id="et-kw-badge">KW –</span>
          </div>
          <div class="pickers-row">
            <div class="picker-wrap">
              <div class="picker-label">Nummer</div>
              <div class="drum-picker" id="et-picker-nummer">
                <div class="picker-items" id="et-picker-nummer-items"></div>
                <div class="picker-fade-top"></div>
                <div class="picker-fade-bottom"></div>
                <div class="picker-selector"></div>
              </div>
            </div>
            <div class="picker-wrap">
              <div class="picker-label">Lieferant</div>
              <div class="drum-picker" id="et-picker-lieferant">
                <div class="picker-items" id="et-picker-lieferant-items"></div>
                <div class="picker-fade-top"></div>
                <div class="picker-fade-bottom"></div>
                <div class="picker-selector"></div>
              </div>
            </div>
          </div>
          <div class="lieferung-preview" id="et-lieferung-preview">–</div>
        </div>
        <input type="hidden" id="etiketten-lieferung" />
      </div>

      <button class="btn-secondary" style="margin-top:.5rem;" onclick="closeEtikettenModal()">Abbrechen</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="header-logo-row">
        <img src="/logo.png" alt="PITUPITA" class="header-logo" />
      </div>
      <div class="header-controls-row">
        <a href="#" id="portal-back-btn" class="portal-back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg>
          Portal
        </a>
        <div class="header-right">
          <div class="connection-status" id="conn-status">
            <span class="dot"></span>
            <span class="conn-label">Verbinde...</span>
          </div>
          <div class="current-user" id="current-user-display">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="current-user-name">-</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Seitenüberschrift -->
  <div class="page-title">Fehlende Artikel</div>

  <!-- Statistik-Banner -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-num" id="stat-offen">0</span>
      <span class="stat-label">Offen</span>
    </div>
    <div class="stat-card">
      <span class="stat-num green" id="stat-erledigt">0</span>
      <span class="stat-label">Erledigt</span>
    </div>
    <div class="stat-card">
      <span class="stat-num blue" id="stat-etiketten">0</span>
      <span class="stat-label">Etiketten</span>
    </div>
    <div class="stat-card">
      <span class="stat-num gray" id="stat-gesamt">0</span>
      <span class="stat-label">Gesamt</span>
    </div>
  </div>

  <main>
    <!-- Neuer Eintrag -->
    <section class="card form-card">
      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <h2>Fehlende Ware melden</h2>
        <button class="toggle-form-btn" id="toggle-form-btn" onclick="toggleForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>
      <div id="form-body">
        <div class="form-grid">
          <div class="form-group required full-width">
            <label>Artikel</label>
            <div class="input-wrap">
              <input type="text" id="f-artikel" placeholder="Artikelname oder Artikelnummer" maxlength="150" autocomplete="off" />
              <button type="button" id="f-artikel-clear" class="input-clear hidden" tabindex="-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <input type="hidden" id="f-name" />
            <input type="hidden" id="f-nummer" />
          </div>
          <div class="form-group required">
            <label>Lagerort</label>
            <input type="text" id="f-lagerort" placeholder="z.B. F04-02-02" maxlength="80" list="lagerorte-list" />
            <datalist id="lagerorte-list"></datalist>
          </div>
          <div class="form-group">
            <label>AUFGABE</label>
            <select id="f-einheit">
              <option>AUFFÜLLEN</option>
              <option>RESERVE AUFFÜLLEN</option>
              <option>BEKLEBEN</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>Notiz (optional)</label>
            <input type="text" id="f-notiz" placeholder="z.B. DRINGEND" maxlength="200" />
          </div>
        </div>
        <div id="bestand-info" class="bestand-info hidden"></div>
        <div id="anmerkung-info" class="anmerkung-info hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <span id="anmerkung-text"></span>
        </div>
        <button class="btn-submit" onclick="submitArtikel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="12 5 12 19"/><polyline points="5 12 12 5 19 12"/></svg>
          Melden
        </button>
      </div>
    </section>

    <!-- Filter & Liste -->
    <section class="card list-card">
      <div class="card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <h2>Fehlende Waren</h2>
        <div class="filter-tabs">
          <button class="tab active" data-filter="offen" onclick="setFilter('offen', this)">Offen</button>
          <button class="tab" data-filter="etiketten" onclick="setFilter('etiketten', this)">Etiketten</button>
          <button class="tab" data-filter="erledigt" onclick="setFilter('erledigt', this)">Erledigt</button>
          <button class="tab" data-filter="alle" onclick="setFilter('alle', this)">Alle</button>
        </div>
      </div>

      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Suchen nach Artikel, Lagerort..." oninput="renderListe()" />
      </div>

      <div id="artikel-liste">
        <div class="loading">
          <div class="spinner"></div>
          <span>Lade Daten...</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Toast-Bereich -->
  <div id="toast-container"></div>

  <script src="/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
