<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PITUPITA – Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #3b82f6;
      --green: #22c55e;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    html { font-size: 15px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── LOGIN PAGE ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: radial-gradient(ellipse at 50% 0%, #1e3a5f 0%, #0f172a 60%);
    }
    .login-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      display: block;
      height: 48px;
      margin: 0 auto 1.5rem;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: .25rem;
      color: var(--text);
    }
    .login-sub {
      text-align: center;
      color: var(--text2);
      font-size: .9rem;
      margin-bottom: 1.75rem;
    }
    .login-box input {
      width: 100%;
      padding: .75rem 1rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: .75rem;
      outline: none;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box input::placeholder { color: var(--text3); }
    .btn-login {
      width: 100%;
      padding: .85rem;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-login:hover { background: #2563eb; }
    .btn-login:active { transform: scale(.98); }
    .login-error {
      margin-top: .75rem;
      padding: .6rem .9rem;
      background: #3f1515;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius-sm);
      color: #fca5a5;
      font-size: .85rem;
      text-align: center;
      display: none;
    }
    .login-error.visible { display: block; }

    /* ── DASHBOARD ── */
    .dashboard { display: none; min-height: 100vh; flex-direction: column; }
    .dashboard.active { display: flex; }

    .portal-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: .9rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .portal-header-logo { height: 32px; }
    .portal-header-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .portal-header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .portal-user-badge {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .35rem .75rem;
      font-size: .85rem;
      color: var(--text2);
    }
    .portal-user-badge svg { width: 14px; height: 14px; flex-shrink: 0; }
    .portal-user-badge strong { color: var(--text); }
    .btn-logout {
      display: flex; align-items: center; gap: .3rem;
      background: none; border: none;
      color: var(--text3);
      font-size: .82rem;
      font-family: inherit;
      cursor: pointer;
      padding: .35rem .5rem;
      border-radius: 6px;
      transition: color .2s, background .2s;
    }
    .btn-logout:hover { color: var(--text); background: var(--bg3); }
    .btn-logout svg { width: 15px; height: 15px; }

    .dashboard-body {
      flex: 1;
      padding: 2rem 1rem;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }
    .dashboard-greeting {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .3rem;
    }
    .dashboard-sub {
      color: var(--text2);
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .9rem;
    }
    @media (max-width: 380px) {
      .apps-grid { grid-template-columns: 1fr; }
    }

    .app-tile {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .1s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .app-tile:hover:not(.soon) {
      border-color: var(--accent);
      background: #1a2a3f;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,.15);
    }
    .app-tile:active:not(.soon) { transform: translateY(0); }
    .app-tile.soon {
      opacity: .55;
      cursor: default;
    }
    .app-tile-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: .4rem;
    }
    .app-tile-icon svg { width: 24px; height: 24px; }
    .app-tile-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .app-tile-sub {
      font-size: .78rem;
      color: var(--text2);
      line-height: 1.4;
    }
    .soon-badge {
      position: absolute;
      top: .6rem; right: .6rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 600;
      color: var(--text3);
      padding: .15rem .5rem;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    /* icon colors */
    .icon-blue   { background: #1e3a5f; color: #60a5fa; }
    .icon-yellow { background: #3b2a00; color: #fbbf24; }
    .icon-red    { background: #3b0a0a; color: #f87171; }
    .icon-green  { background: #0a2a1a; color: #4ade80; }

    .shake { animation: shake .35s ease; }
    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      25%{ transform:translateX(-6px) }
      75%{ transform:translateX(6px) }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-page" id="login-page">
    <div class="login-box">
      <img src="/logo.png" alt="PITUPITA" class="login-logo" />
      <div class="login-title">Willkommen</div>
      <div class="login-sub">Melde dich mit deinen Zugangsdaten an.</div>
      <input type="text" id="portal-name" placeholder="Name..." maxlength="40" autocomplete="off" />
      <input type="password" id="portal-passwort" placeholder="Passwort..." maxlength="80" autocomplete="off" />
      <button class="btn-login" id="portal-login-btn" onclick="portalLogin()">Anmelden</button>
      <div class="login-error" id="login-error">Name oder Passwort falsch.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <header class="portal-header">
      <img src="/logo.png" alt="PITUPITA" class="portal-header-logo" />
      <span class="portal-header-title">PITUPITA Portal</span>
      <div class="portal-header-right">
        <div class="portal-user-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <strong id="portal-user-name"></strong>
        </div>
        <button class="btn-logout" onclick="portalLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Abmelden
        </button>
      </div>
    </header>

    <div class="dashboard-body">
      <div class="dashboard-greeting" id="dashboard-greeting">Hallo!</div>
      <div class="dashboard-sub">Wähle ein Programm:</div>
      <div class="apps-grid" id="apps-grid"></div>
    </div>
  </div>

  <script src="portal.js"></script>
</body>
</html>
